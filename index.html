:root{
  --or:#E87B4A; --re:#C94F42; --dk:#1C1C1C; --md:#3A3A3A;
  --gy:#8A8A8A; --lg:#F4F2EF; --wh:#FFFFFF;
  --ok:#5A8A5A; --am:#D9A13B;
  --bf:'SkopexGothic','DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--bf);background:#DEDAD5;min-height:100vh;color:var(--dk);}

#hdr{background:var(--dk);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
#hdr img{height:30px;object-fit:contain;}
#hdr h1{color:var(--wh);font-size:15px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
#hdr .sub{color:var(--gy);font-size:11px;letter-spacing:.04em;}

main{max-width:760px;margin:0 auto;padding:14px 14px 60px;}

#stats{display:flex;gap:8px;margin-bottom:14px;}
.stat{flex:1;background:var(--wh);border-radius:10px;padding:10px 6px;text-align:center;border-bottom:3px solid var(--md);}
.stat b{display:block;font-size:22px;font-family:'DM Mono',monospace;}
.stat span{font-size:10px;color:var(--gy);text-transform:uppercase;letter-spacing:.05em;}
.stat.s-pos{border-bottom-color:var(--ok);}
.stat.s-rec{border-bottom-color:var(--or);}

#recPanel{background:var(--dk);border-radius:12px;padding:14px;margin-bottom:16px;}
#recPanel h2{color:var(--or);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.recItem{background:var(--md);border-radius:9px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.recItem:last-child{margin-bottom:0;}
.recInfo{flex:1;min-width:0;}
.recInfo b{color:var(--wh);font-size:14px;display:block;}
.recInfo span{color:var(--gy);font-size:11.5px;display:block;}
.recDue{font-family:'DM Mono',monospace;font-size:11px;color:var(--am);white-space:nowrap;}
.recDue.late{color:var(--re);font-weight:600;}
.waBtn{background:#25D366;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:var(--bf);}
.waBtn.dis{background:var(--gy);pointer-events:none;}
.okBtn{background:transparent;color:var(--gy);border:1px solid var(--gy);border-radius:8px;padding:7px 9px;font-size:12px;cursor:pointer;font-family:var(--bf);}
.okBtn:active{color:var(--wh);border-color:var(--wh);}
#recEmpty{color:var(--gy);font-size:13px;}

#filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.chip{border:1px solid var(--md);background:transparent;color:var(--md);border-radius:20px;padding:6px 13px;font-size:12px;cursor:pointer;font-family:var(--bf);}
.chip.on{background:var(--dk);color:var(--wh);border-color:var(--dk);}
#q{width:100%;border:1px solid #C9C4BD;background:var(--wh);border-radius:9px;padding:9px 12px;font-size:14px;margin-bottom:14px;font-family:var(--bf);outline:none;}

.prop{background:var(--wh);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.propHd{background:var(--lg);padding:11px 14px;border-bottom:1px solid #E4E0DA;}
.propHd h3{font-size:15px;font-weight:600;}
.propHd .loc{font-size:12px;color:var(--gy);}
.propLinks{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.plink{font-size:11px;color:var(--md);border:1px solid #C9C4BD;border-radius:6px;padding:3px 9px;text-decoration:none;background:var(--wh);cursor:pointer;font-family:var(--bf);}
.plink:active{background:var(--lg);}

.vis{padding:12px 14px;border-bottom:1px solid #F0EDE8;}
.vis:last-child{border-bottom:none;}
.visTop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.visDate{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--gy);}
.badge{font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-radius:5px;padding:2px 8px;font-weight:600;color:#fff;}
.b-positiva{background:var(--ok);}
.b-neutra{background:var(--am);}
.b-negativa{background:var(--re);}
.stars{color:var(--or);font-size:14px;letter-spacing:1px;cursor:pointer;user-select:none;}
.stars .off{color:#D8D3CC;}
.visName{font-size:14.5px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.visName a{font-size:11px;}
.visCom{font-size:13.5px;line-height:1.45;color:var(--md);margin-top:4px;}
.seg{margin-top:7px;border-left:2px solid #E4E0DA;padding-left:9px;}
.seg div{font-size:12px;color:var(--gy);margin-bottom:3px;}
.seg b{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--md);margin-right:5px;}
.recTag{font-size:11px;font-family:'DM Mono',monospace;margin-top:6px;color:var(--am);}
.recTag.done{color:var(--ok);}
.recTag.late{color:var(--re);font-weight:600;}

#empty{text-align:center;color:var(--gy);padding:40px 0;font-size:14px;}
#ft{text-align:center;font-size:10.5px;color:var(--gy);margin-top:24px;font-family:'DM Mono',monospace;}
</style>
</head>

  <div><h1>Tablero de Visitas</h1><div class="sub">Houghton Propiedades</div></div>
</div>
<main>
  <div id="stats"></div>
  <div id="recPanel"></div>
  <div id="filters"></div>
  <input id="q" type="search" placeholder="Buscar propiedad o contacto…">
  <div id="list"></div>
  <div id="ft"></div>
</main>
<script>
const LSK='tv_local';
let DATA={visitas:[]}, FIL='todas', Q='';

const hoy=()=>new Date().toISOString().slice(0,10);
const fmt=d=>{if(!d)return'';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y.slice(2);};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const wa=(tel,nombre,dir)=>{if(!tel)return null;const t=tel.replace(/[^0-9]/g,'');const msg=encodeURIComponent('Hola '+(nombre||'').split(' ')[0]+'! Te escribo de Houghton por la visita a '+dir+'. ¿Cómo lo vieron?');return 'https://wa.me/'+t+'?text='+msg;};

function localMap(){try{return JSON.parse(localStorage.getItem(LSK))||{}}catch(e){return{}}}
function saveLocal(id,patch){const m=localMap();m[id]=Object.assign({},m[id]||{},patch,{updatedAt:new Date().toISOString()});localStorage.setItem(LSK,JSON.stringify(m));}

function merged(){
  const m=localMap();
  return DATA.visitas.map(v=>{
    const l=m[v.id];
    if(l && (!v.updatedAt || l.updatedAt>v.updatedAt)) return Object.assign({},v,l);
    return v;
  });
}

function render(){
  const vs=merged();
  const today=hoy();
  // stats
  const pos=vs.filter(v=>v.resultado==='positiva').length;
  const pend=vs.filter(v=>v.recontactar&&!v.recontactado).length;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><b>'+vs.length+'</b><span>Visitas</span></div>'+
    '<div class="stat s-pos"><b>'+pos+'</b><span>Positivas</span></div>'+
    '<div class="stat s-rec"><b>'+pend+'</b><span>A recontactar</span></div>';
  // recontactos panel: pendientes con fecha <= hoy+2
  const lim=new Date(Date.now()+2*864e5).toISOString().slice(0,10);
  const recs=vs.filter(v=>v.recontactar&&!v.recontactado&&v.recontactar<=lim).sort((a,b)=>a.recontactar<b.recontactar?-1:1);
  let rp='<h2>Recontactos pendientes</h2>';
  if(!recs.length) rp+='<div id="recEmpty">Nada pendiente por ahora ✓</div>';
  else rp+=recs.map(v=>{
    const late=v.recontactar<today;
    const link=wa(v.contacto?.telefono,v.contacto?.nombre,v.propiedad?.direccion);
    return '<div class="recItem"><div class="recInfo"><b>'+esc(v.contacto?.nombre||'—')+'</b><span>'+esc(v.propiedad?.direccion||'')+'</span><span class="recDue'+(late?' late':'')+'">'+(late?'vencido · ':'')+fmt(v.recontactar)+'</span></div>'+
      (link?'<a class="waBtn" href="'+link+'" target="_blank">WhatsApp</a>':'<span class="waBtn dis">sin tel.</span>')+
      '<button class="okBtn" onclick="markDone(\''+v.id+'\')">✓</button></div>';
  }).join('');
  document.getElementById('recPanel').innerHTML=rp;
  // filters
  const chips=[['todas','Todas'],['positiva','Positivas'],['neutra','Neutras'],['negativa','Negativas'],['pend','A recontactar']];
  document.getElementById('filters').innerHTML=chips.map(([k,t])=>'<button class="chip'+(FIL===k?' on':'')+'" onclick="setFil(\''+k+'\')">'+t+'</button>').join('');
  // list grouped by property
  let fv=vs.filter(v=>{
    if(FIL==='pend'&&!(v.recontactar&&!v.recontactado))return false;
    if(['positiva','neutra','negativa'].includes(FIL)&&v.resultado!==FIL)return false;
    if(Q){const h=((v.propiedad?.direccion||'')+' '+(v.propiedad?.localidad||'')+' '+(v.contacto?.nombre||'')+' '+(v.comentario||'')).toLowerCase();if(!h.includes(Q))return false;}
    return true;
  });
  const groups={};
  fv.forEach(v=>{const k=(v.propiedad?.direccion||'?')+'|'+(v.propiedad?.localidad||'');(groups[k]=groups[k]||[]).push(v);});
  const keys=Object.keys(groups).sort((a,b)=>{
    const ma=Math.max(...groups[a].map(v=>v.fechaVisita||'')), mb=Math.max(...groups[b].map(v=>v.fechaVisita||''));
    return ma<mb?1:-1;
  });
  const list=document.getElementById('list');
  if(!keys.length){list.innerHTML='<div id="empty">Sin visitas para este filtro.</div>';return;}
  list.innerHTML=keys.map(k=>{
    const g=groups[k].sort((a,b)=>(a.fechaVisita||'')<(b.fechaVisita||'')?1:-1);
    const p=g[0].propiedad||{};
    let links='';
    if(p.linkHoughton)links+='<a class="plink" href="'+esc(p.linkHoughton)+'" target="_blank">Houghton</a>';
    if(p.linkTokko)links+='<a class="plink" href="'+esc(p.linkTokko)+'" target="_blank">Tokko</a>';
    if(p.dropbox)links+='<button class="plink" onclick="copyDbx(this,\''+esc(p.dropbox).replace(/'/g,"\\'")+'\')">Dropbox ⧉</button>';
    return '<div class="prop"><div class="propHd"><h3>'+esc(p.direccion||'—')+'</h3><div class="loc">'+esc(p.localidad||'')+'</div>'+(links?'<div class="propLinks">'+links+'</div>':'')+'</div>'+
      g.map(v=>{
        const link=wa(v.contacto?.telefono,v.contacto?.nombre,p.direccion);
        const stars=v.resultado==='positiva'?'<span class="stars" data-id="'+v.id+'">'+[1,2,3,4,5].map(i=>'<span data-n="'+i+'" class="'+(i<=(v.calificacion||0)?'':'off')+'">★</span>').join('')+'</span>':'';
        let rec='';
        if(v.recontactar){
          if(v.recontactado)rec='<div class="recTag done">✓ recontactado</div>';
          else rec='<div class="recTag'+(v.recontactar<today?' late':'')+'">recontactar '+fmt(v.recontactar)+(v.recontactar<today?' · vencido':'')+'</div>';
        }
        const seg=(v.seguimiento||[]).length>1?'<div class="seg">'+v.seguimiento.map(s=>'<div><b>'+fmt(s.fecha)+'</b>'+esc(s.nota)+'</div>').join('')+'</div>':'';
        return '<div class="vis"><div class="visTop"><span class="visDate">'+fmt(v.fechaVisita)+'</span><span class="badge b-'+esc(v.resultado||'neutra')+'">'+esc(v.resultado||'')+'</span>'+stars+'</div>'+
          '<div class="visName">'+esc(v.contacto?.nombre||'—')+(link?' <a class="waBtn" style="padding:4px 9px" href="'+link+'" target="_blank">wa</a>':'')+'</div>'+
          '<div class="visCom">'+esc(v.comentario||'')+'</div>'+seg+rec+'</div>';
      }).join('')+'</div>';
  }).join('');
  document.querySelectorAll('.stars').forEach(el=>el.addEventListener('click',e=>{
    const n=e.target.dataset.n;if(!n)return;
    saveLocal(el.dataset.id,{calificacion:+n});render();
  }));
}
window.setFil=k=>{FIL=k;render();};
window.markDone=id=>{saveLocal(id,{recontactado:true});render();};
window.copyDbx=(btn,path)=>{navigator.clipboard.writeText(path).then(()=>{btn.textContent='copiado ✓';setTimeout(()=>btn.textContent='Dropbox ⧉',1500);});};
document.getElementById('q').addEventListener('input',e=>{Q=e.target.value.trim().toLowerCase();render();});

fetch('data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;render();
  document.getElementById('ft').textContent='actualizado '+(d.updatedAt?new Date(d.updatedAt).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—');
}).catch(()=>{document.getElementById('list').innerHTML='<div id="empty">No se pudo cargar data.json</div>';});
</script>
</body>
</html>
